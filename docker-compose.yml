services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - inventory

  pencatatan:
    build: .
    env_file: .env
    environment:
      SERVICE_NAME: pencatatan
      APP_URL: http://pencatatan.localhost
    networks:
      - inventory

  cetak-laporan:
    build: .
    env_file: .env
    environment:
      SERVICE_NAME: cetak-laporan
      APP_URL: http://laporan.localhost
    networks:
      - inventory

  notifikasi-komunikasi:
    build: .
    env_file: .env
    environment:
      SERVICE_NAME: notifikasi-komunikasi
      APP_URL: http://notifikasi.localhost
    networks:
      - inventory

networks:
  inventory:
    driver: bridge
